# One-click free deploy on Render (https://render.com).
# Push this repo, then "New > Blueprint" and point it at this file.
services:
  - type: web
    name: triage-desk
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn web.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
